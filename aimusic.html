<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Song (GitHub Only)</title>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }
.container {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.7);
  padding:10px; border-radius:10px; z-index:10;
}
textarea { width:300px; height:100px; }
button { width:100%; margin-top:5px; padding:8px; }
canvas { display:block; }
</style>
</head>

<body>

<div class="container">
  <h3>🎵 GitHub Song Generator</h3>

  <textarea id="lyrics" placeholder="Enter lyrics line by line"></textarea>

  <input id="meter" placeholder="slow / fast / sad / happy">

  <select id="voice">
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <button onclick="start()">Generate</button>
  <button onclick="download()">Download</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let bubbles = [];
let currentText = "";
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let recorder, chunks = [];

// bubbles
for(let i=0;i<50;i++){
  bubbles.push({x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*5+2,s:Math.random()*1+0.5});
}

// animation
function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle=`hsl(${Date.now()/50%360},50%,10%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  bubbles.forEach(b=>{
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    b.y-=b.s;
    if(b.y<0) b.y=canvas.height;
  });

  ctx.fillStyle="yellow";
  ctx.font="40px Arial";
  ctx.textAlign="center";
  ctx.fillText(currentText,canvas.width/2,canvas.height-80);

  requestAnimationFrame(draw);
}
draw();

// simple tone generator (music feel)
function playTone(freq,duration){
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.start();

  gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration);

  osc.stop(audioCtx.currentTime+duration);
}

// meter → tempo
function getTempo(m){
  if(m.includes("fast")) return 0.2;
  if(m.includes("slow")) return 0.6;
  return 0.4;
}

// fake melody
function playMelody(text, meter){
  let tempo = getTempo(meter);
  let notes = [220,246,261,293,329,349];

  let i=0;
  let interval = setInterval(()=>{
    playTone(notes[Math.floor(Math.random()*notes.length)], tempo);
    i++;
    if(i>text.length) clearInterval(interval);
  }, tempo*1000);
}

// TTS
function speak(text){
  return new Promise(res=>{
    let u = new SpeechSynthesisUtterance(text);
    u.onend = res;
    speechSynthesis.speak(u);
  });
}

async function start(){
  chunks=[];

  let lines = document.getElementById("lyrics").value.split("\n");
  let meter = document.getElementById("meter").value;

  let stream = canvas.captureStream(30);
  recorder = new MediaRecorder(stream);
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.start();

  for(let line of lines){
    currentText=line;
    playMelody(line,meter);
    await speak(line);
  }

  recorder.stop();
  currentText="Done ✅";
}

function download(){
  recorder.onstop=()=>{
    let blob=new Blob(chunks,{type:"video/webm"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="song_video.webm";
    a.click();
  };
}
</script>

</body>
</html>
