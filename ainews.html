<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>AI News Anchor</title>

<style>
body { text-align:center; background:#111; color:white; font-family:Arial;}
textarea { width:90%; height:100px; }
.container { position:relative; width:360px; margin:auto;}
#anchor { width:100%; border-radius:10px;}
.ticker {
  position:absolute; bottom:0; width:100%;
  background:red; white-space:nowrap; overflow:hidden;
}
.ticker span {
  display:inline-block; padding-left:100%;
  animation:scroll 10s linear infinite;
}
@keyframes scroll {
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}
</style>

</head>

<body>

<h2>📰 AI News Anchor</h2>

<textarea id="news">नमस्कार, आज की ताज़ा खबरें...</textarea><br>

<select id="voice">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<button onclick="startNews()">Generate</button>

<div class="container">
<img id="anchor">
<div class="ticker"><span id="tickerText"></span></div>
</div>

<script>

// ✅ BASE64 REAL HUMAN IMAGES
let maleImg = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...(shortened)";
let femaleImg = "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...(shortened)";

function startNews(){

let text = document.getElementById("news").value;
let type = document.getElementById("voice").value;
let anchor = document.getElementById("anchor");

anchor.src = (type==="male") ? maleImg : femaleImg;

document.getElementById("tickerText").innerText = text;

// speech
let speech = new SpeechSynthesisUtterance(text);
speech.lang = "hi-IN";
speechSynthesis.speak(speech);

// fake lip sync
let anim = setInterval(()=>{
  anchor.style.transform="scale(1.02)";
  setTimeout(()=>anchor.style.transform="scale(1)",150);
},300);

speech.onend=()=>clearInterval(anim);

}
</script>

</body>
</html>
