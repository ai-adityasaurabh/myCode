<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>AI News Anchor</title>

<style>
body {
  text-align:center;
  background:#111;
  color:white;
  font-family:Arial;
}

textarea { width:90%; height:100px; }

.container {
  position:relative;
  width:360px;
  margin:auto;
}

/* SVG anchor */
#anchor {
  width:100%;
  height:auto;
  transition:0.2s;
}

/* ticker */
.ticker {
  position:absolute;
  bottom:0;
  width:100%;
  background:red;
  white-space:nowrap;
  overflow:hidden;
}
.ticker span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 10s linear infinite;
}

@keyframes scroll {
  0% { transform:translateX(0); }
  100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<h2>📰 AI Hindi News Anchor</h2>

<textarea id="news">नमस्कार, आज की ताज़ा खबरें...</textarea><br>

<select id="voice">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<button onclick="startNews()">▶ Generate</button>

<div class="container">
  <!-- SVG HUMAN -->
  <svg id="anchor" viewBox="0 0 200 300">

    <!-- face -->
    <circle cx="100" cy="100" r="60" fill="#f1c27d"/>

    <!-- hair -->
    <path id="hair" d="M40 80 Q100 10 160 80" fill="black"/>

    <!-- eyes -->
    <circle cx="75" cy="90" r="5"/>
    <circle cx="125" cy="90" r="5"/>

    <!-- mouth -->
    <ellipse id="mouth" cx="100" cy="130" rx="15" ry="5" fill="black"/>

    <!-- body -->
    <rect x="50" y="160" width="100" height="120" fill="blue"/>

  </svg>

  <div class="ticker"><span id="tickerText"></span></div>
</div>

<script>

function startNews(){

let text = document.getElementById("news").value;
let type = document.getElementById("voice").value;

// change style (male/female)
let hair = document.getElementById("hair");

if(type === "male"){
  hair.setAttribute("d","M40 80 Q100 10 160 80"); // short hair
} else {
  hair.setAttribute("d","M30 80 Q100 0 170 80 Q150 160 50 160 Z"); // long hair
}

// ticker
document.getElementById("tickerText").innerText = text;

// speech
let speech = new SpeechSynthesisUtterance(text);
speech.lang = "hi-IN";
speechSynthesis.speak(speech);

// lip sync (real moving mouth)
let mouth = document.getElementById("mouth");

let anim = setInterval(()=>{
  mouth.setAttribute("ry", Math.random()*10+2);
},150);

speech.onend = ()=>{
  clearInterval(anim);
  mouth.setAttribute("ry",5);
};

}
</script>

</body>
</html>
