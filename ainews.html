<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>AI News Human</title>

<style>
body {
  text-align:center;
  background:#000;
  color:white;
  font-family:Arial;
}

textarea { width:90%; height:100px; }

.container {
  position:relative;
  width:360px;
  margin:auto;
}

#anchor {
  width:100%;
  border-radius:10px;
}

/* ticker */
.ticker {
  position:absolute;
  bottom:0;
  width:100%;
  background:red;
  white-space:nowrap;
  overflow:hidden;
}
.ticker span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 10s linear infinite;
}

@keyframes scroll {
  0% { transform:translateX(0); }
  100% { transform:translateX(-100%); }
}
</style>
</head>

<body>

<h2>📰 AI News Human</h2>

<textarea id="news">नमस्कार, आज की ताज़ा खबरें...</textarea><br>

<button onclick="start()">▶ Start</button>
<button onclick="download()">⬇ Download MP4</button>

<br><br>

<div class="container" id="area">
  <!-- REAL HUMAN IMAGE -->
  <img id="anchor"
   src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=400">

  <div class="ticker">
    <span id="tickerText"></span>
  </div>
</div>

<script>

let recorder, chunks=[];

function start(){

let text=document.getElementById("news").value;
document.getElementById("tickerText").innerText=text;

// voice
let speech=new SpeechSynthesisUtterance(text);
speech.lang="hi-IN";
speechSynthesis.speak(speech);

// record
let stream=document.getElementById("area").captureStream(30);
recorder=new MediaRecorder(stream);
chunks=[];

recorder.ondataavailable=e=>chunks.push(e.data);

recorder.onstop=()=>{
  let blob=new Blob(chunks,{type:"video/mp4"});
  let url=URL.createObjectURL(blob);

  let a=document.createElement("a");
  a.href=url;
  a.download="news.mp4";
  a.click();
};

recorder.start();

speech.onend=()=>recorder.stop();

}

function download(){
if(recorder) recorder.stop();
}

</script>

</body>
</html>
