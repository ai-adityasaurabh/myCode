<!DOCTYPE html>
<html>
<head>
  <title>Indian Podcast Generator</title>
</head>
<body>

<h2>🎙️ Indian Podcast Generator (A = Male, B = Female)</h2>

<textarea id="input" rows="10" cols="50">
A: Namaste dosto!
B: Namaste! Aaj ka topic AI hai.
A: Kya AI future hai?
B: Bilkul, AI bahut powerful hai.
</textarea><br><br>

<button onclick="loadVoices()">🔄 Load Voices</button>
<button onclick="generate()">▶ Generate Podcast</button>

<script>
let voiceA = null;
let voiceB = null;

function loadVoices() {
  const voices = speechSynthesis.getVoices();

  console.log("Available voices:", voices);

  // Try to find Indian Hindi voices
  let hindiVoices = voices.filter(v => v.lang.includes("hi"));

  // Assign Male (A)
  voiceA = hindiVoices.find(v => v.name.toLowerCase().includes("male"))
           || hindiVoices[0]
           || voices[0];

  // Assign Female (B)
  voiceB = hindiVoices.find(v => v.name.toLowerCase().includes("female"))
           || hindiVoices[1]
           || voices[1];

  alert("Voices Loaded ✅");
}

function generate() {
  const text = document.getElementById("input").value;
  const lines = text.split("\n");

  function speakLine(i) {
    if (i >= lines.length) return;

    let line = lines[i].trim();
    if (!line) return speakLine(i+1);

    let parts = line.split(":");
    if (parts.length < 2) return speakLine(i+1);

    let speaker = parts[0].trim();
    let content = parts.slice(1).join(":").trim();

    let utter = new SpeechSynthesisUtterance(content);

    if (speaker === "A") utter.voice = voiceA;
    else utter.voice = voiceB;

    utter.rate = 0.95;
    utter.pitch = speaker === "A" ? 0.9 : 1.2;

    utter.onend = () => speakLine(i+1);
    speechSynthesis.speak(utter);
  }

  speakLine(0);
}

// Important for Chrome
speechSynthesis.onvoiceschanged = loadVoices;
</script>

</body>
</html>
